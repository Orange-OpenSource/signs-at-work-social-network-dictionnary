<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="utf-8"/>
</head>
<body>



<div th:fragment="div" id="add_sign_to_label" class="modal fade" role="dialog">
    <div class="modal-dialog">
        <!-- Modal content-->
        <div class="modal-content">
            <div class=" modal-header">
                <button type="button" class="close" data-dismiss="modal"></button>
                <div class="pull-left">
                    <div class="sticker_plain_white pull-left"></div>
                    <h2 class="pull-right" th:text="#{sign.tag}"/>
                </div>
            </div>
            <div id="modal_body_add_favorite" class="modal-body text-center">
              <h2 class="blue" th:text="#{choose_label_for_sign}"></h2>
                <ul class="nav nav-list primary left-menu">
                  <li th:if="${isAuthenticated}" class="clear aside_bckg_li">
                    <a class="all_li_clickable" href="#" data-toggle="modal" data-target="#create-new-label_add_sign">
                        <div class="sticker_add  pull-left"></div>
                        <h2  class="label_favorite_Liste_H2 container_H2 text_hyphenation" th:text="#{label.new}"></h2>
                        <div class="pull-right add_black"></div>
                    </a>
                  </li>
                </ul>
                  <form id="AddSignToLabelsForm" th:if="${not #lists.isEmpty(labels)}"
                        th:object="${videoView}"
                        method="post">
                    <div class="form-group">
                      <ul id="labels-container" class="nav nav-list primary left-menu">
                        <li class="clear aside_bckg_li" th:each="label :${labels}">
                          <label th:id="${label.name}"
                                 th:for="${#ids.next('signLabelsIds')}">
                            <div th:if="${label.type == T(com.orange.signsatwork.biz.domain.LabelType).Admin}" class="pull-left sticker_plain"></div>
                            <div th:if="${label.type == T(com.orange.signsatwork.biz.domain.LabelType).User}" class="pull-left sticker_plain_white"></div>
                            <input type="checkbox" th:field="*{signLabelsIds}" th:value="${label.id}"/>
                            <h4 th:if="${label.type == T(com.orange.signsatwork.biz.domain.LabelType).Admin}" class="label_favorite_Liste_H2 container_H2 text_hyphenation" th:text="${label.name}"></h4>
                            <h4 th:if="${label.type == T(com.orange.signsatwork.biz.domain.LabelType).User}" class="label_favorite_Liste_H2 container_H2 text_hyphenation" th:text="${label.name}"></h4>
                          </label>
                        </li>
                      </ul>
                    </div>
                  </form>
            </div>
          <div class="modal-footer">
            <button id="cancel_modal_add_favorite" data-dismiss="modal"
                    th:onclick="javascript:onReloadForm()"
                    th:text="#{undo}"></button>
            <button id="validate_modal_add_favorite" th:data-signId="${signView.id}"
                    th:onclick="javascript:onAddSignToLabelsForm(this.getAttribute('data-signId'))"
                    th:text="#{validate}"></button>
          </div>
        </div>
    </div>
</div>

<div th:replace="fragments/modal-new-label-add-sign :: div"/>

</body>
</html>
