<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:include="fragments/header-head :: head"></th:block>
</head>

<header role="banner" th:replace="fragments/header-label-admin :: header">&nbsp;</header>

<body>
<div class="container">
  <div class="row">
    <div class="pull-right col-md-12 col-xs-12 col-sm-12 col-lg-12">
        <aside class="sidebar">
          <ul class="nav nav-list primary left-menu">
            <li class="label_sign aside_bckg_li">
              <a class="all_li_clickable" data-target="#rename_label" data-toggle="modal" href="#">
                <h1 class="container_H2 text_hyphenation" th:text="${label.name}"/>
                <div class="pull-right edit_black"></div>
              </a>
            </li>
            <li class="aside_bckg_li">
              <a class="all_li_clickable" data-target="#add_file_icon_label" data-toggle="modal" href="#">
                <div class="pull-left col-lg-12 col-md-12 col-xs-12">
                  <img class="pull-left" id="iconLabel"
                       th:if="${label.iconFilename != null}"
                       th:src="@{/data/labels/{file}(file=${label.iconFilename})}"/>
                  <div class="pull-left sticker_plain" th:if="${label.type == T(com.orange.signsatwork.biz.domain.LabelType).Admin && label.iconFilename == null}"></div>
                  <div class="pull-left sticker" th:if="${label.type == T(com.orange.signsatwork.biz.domain.LabelType).User && label.iconFilename == null}"></div>
                  <h4 class="container_H2 text_hyphenation" th:text="#{label.change-icon}"></h4>
                  <div class="pull-right edit_black"></div>
                </div>
              </a>
            </li>
            <li class="aside_bckg_li" th:if="!${isLabelHaveSigns}">
              <a class="all_li_clickable" data-target="#delete_label" data-toggle="modal" href="#">
                <div class="pull-left col-lg-12 col-md-12 col-xs-12">
                  <div class="pull-left sticker_add-del"></div>
                  <h4 class="container_H2 text_hyphenation" th:text="#{label.delete}"></h4>
                  <div class="pull-right chevron"></div>
                </div>
              </a>
            </li>
            <li class=" disabled aside_bckg_li" th:if="${isLabelHaveSigns}">
              <a class="disabled" data-target="#delete_label" data-toggle="modal" href="#">
                <div class="pull-left col-lg-12 col-md-12 col-xs-12">
                  <div class="pull-left sticker_add-del"></div>
                  <h4 class="container_H2 text_hyphenation" th:text="#{label.delete}"></h4>
                  <div class="pull-right chevron_right_grey"></div>
                </div>
              </a>
            </li>
          </ul>
        </aside>
  </div>
</div>

  <div id="add_file_icon_label" class="modal fade" role="dialog">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <button type="button" class="close" data-dismiss="modal"></button>
          <div class="pull-left">
            <div class="pull-left description_movie_white"></div>
            <h2 class="pull-right text_hyphenation" th:utext="#{label.change-icon}"></h2>
          </div>
        </div>
        <div class="spinner spinner_hidden"></div>
        <form id="uploadSelectedPictureFile" th:action="@{/ws/sec/uploadSelectedPictureFileForLabelIcon/} + ${label.id}"  enctype="multipart/form-data"  method="post">
          <div th:if="!${isIOSDevice}" class="modal-body text-center">
            <br/>
            <h4 class="pull-left" id="subtitle_for_modal_video" th:text="#{label.join_file_icon}"></h4><br/>
            <input name="file" type="file" id="InputFile" accept="image/png, image/jpeg"/>
            <h4 id="errorSelectedFileIconSpan"  style="display: none"></h4>
          </div>
          <div th:if="${isIOSDevice}" class="modal-body">
            <br/>
            <h4 class="pull-left" id="subtitle_for_modal_video" th:text="#{sub_title_for_modal_video_IOSDevice}"></h4><br/>
            <input name="file" accept="video/*" capture="camera"  type="file" id="InputFile"  style="display: none"/>
            <h4 id="errorSelectedFileIconSpan"  style="display: none"></h4>
          </div>
          <div id="modal-footer_add_video_file_recording" class="modal-footer">
            <button type="button" data-dismiss="modal" class="btn btn-secondary pull-left" th:title="#{title_cancel}">
              <div class="x-close2_black center-block"></div>
              <span th:text="#{cancel}"></span>
            </button>
            <button id="submitButtonPictureFile" type="submit" class="btn btn-default pull-right"
                    data-dismiss="" disabled="true">
              <div class="v-done2_blue center-block"></div>
              <span th:text="#{publish}"></span>
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

<div class="modal fade" id="rename_label" role="dialog">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <button class="close" data-dismiss="modal" type="button"></button>
        <div class="pull-left">
          <div class="edit_white pull-left"></div>
          <h2 class="pull-right" th:text="#{label.rename_list}"></h2>
        </div>
      </div>
      <div class="modal-body text-center">
        <span id="errorRename" style="display: none" class="red"></span>
        <div class="errorRegexLabelName hidden" th:text="#{errorNameAuthorize}"></div>
        <input class="form-control" id="labelName" name="labelName" th:autofocus="true"
               th:value="${label.name}" type="text" autocomplete="off"/>
        <span id="warningRename" style="display: none"></span>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary pull-left" data-dismiss="modal" th:title="#{title_cancel}" type="button">
          <div class="x-close2_black center-block"></div>
          <span th:text="#{cancel}"></span>
        </button>
        <button class="btn btn-default pull-right" data-dismiss="" id="submit-rename-modal"
                th:data-labelId="${label.id}" th:data-force="false"
                th:onclick="javascript:onRenameLabel(this.getAttribute('data-labelId'), this.getAttribute('data-force'))" type="submit">
          <div class="v-done2_blue center-block"></div>
          <span th:text="#{continue}"></span>
        </button>
        <button class="btn btn-default pull-right" data-dismiss="" id="submit-force-rename-modal" style="display: none"
                th:data-labelId="${label.id}" th:data-force="true"
                th:onclick="javascript:onRenameLabel(this.getAttribute('data-labelId'), this.getAttribute('data-force'))" type="submit">
          <div class="v-done2_blue center-block"></div>
          <span th:text="#{continue}"></span>
        </button>
      </div>
    </div>
  </div>
</div>

<div class="modal" id="validate_rename_label" role="dialog">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <div class="pull-left">
          <div class="edit_white pull-left"></div>
          <h2 class="pull-right" th:text="#{label.renamed_title}"/>
        </div>
      </div>
      <div class="modal-body text-center">
        <h4 id="renamed_label"></h4>
      </div>
    </div>
  </div>
</div>
<div class="modal fade" id="delete_label" role="dialog">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <button class="close" data-dismiss="modal" type="button"></button>
        <div class="pull-left">
          <div class="sticker_plain_white pull-left"></div>
          <h2 class="pull-right" th:text="#{label.delete_list}"></h2>
        </div>
      </div>
      <div class="modal-body text-center">
        <h4 th:text="#{label.confirm_delete(${label.name})}"></h4>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary pull-left" data-dismiss="modal" th:title="#{title_cancel}" type="button">
          <div class="x-close2_black center-block"></div>
          <span th:text="#{cancel}"></span>
        </button>
        <button class="btn btn-default pull-right" data-dismiss=""
                th:data-labelId="${label.id}"
                th:onclick="javascript:onDeleteLabel(this.getAttribute('data-labelId'))" type="submit">
          <div class="v-done2_blue center-block"></div>
          <span th:text="#{confirm}"></span>
        </button>
      </div>
    </div>
  </div>
</div>
<div class="modal" id="validate_delete_label" role="dialog">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <div class="pull-left">
          <div class="sticker_plain_white pull-left"></div>
          <h2 class="pull-right" th:text="#{label.deleted_title}"/>
        </div>
      </div>
      <div class="modal-body text-center">
        <h4 th:text="#{label.deleted(${label.name})}"></h4>
      </div>
    </div>
  </div>
</div>
</div>
</body>


<script src="../public/js/label-admin.js" th:src="@{/js/label-admin.js}" type="text/javascript"></script>

</html>
