<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:include="fragments/header-head :: head"></th:block>
</head>

<header role="banner" th:replace="fragments/header-labels-suggest :: header">&nbsp;</header>
<div th:replace="fragments/modal-new-label :: div"/>

<body class="margin-for-footer">
<div class="container">
  <div class="row ">
    <div class="col-md-4 col-xs-12 col-lg-12">
      <h2 class="already_exits" th:if="${isLabelAlreadyExist}" th:text="#{label.already_exists}"></h2>
      <aside class="sidebar">
        <ul class="nav nav-list primary left-menu">
          <li class="aside_bckg_li">
            <a class="all_li_clickable" data-target="#new-label" data-toggle="modal" href="#">
              <h2 class="container_H2 text_hyphenation" th:text="${labelName}"/>
              <div class="pull-right  edit_black"></div>
            </a>
          </li>
          <li class="aside_bckg_li" th:if="${islabelAlreadyExist}">
            <a class="all_li_clickable" th:href="@{/sec/label/} + ${labelMatche.id}">
              <div class="pull-left member_blue-communities-suggest "></div>
              <h4 class="container_H2 text_hyphenation" th:text="#{label.see}"></h4>
              <div class="pull-right chevron"></div>
            </a>
          </li>
        </ul>
      </aside>
      <div th:if="${not #lists.isEmpty(labelsWithSameName)}">
        <h2 class="same_name" th:text="#{label.with-same-name}"/>
        <div th:each="label:${labelsWithSameName}">
          <aside class="sidebar">
            <ul class="nav nav-list primary left-menu">
              <li class="dotted-top">
                <a class="all_li_clickable" th:href="@{/sec/label/} + ${label.id}">
                    <div class="pull-left see_group_blue" th:if="${label.type == 'Admin'}"></div>
                    <div class="pull-left see_group_project_blue" th:if="${label.type == 'User'}"></div>
                    <h2 class="container_H2 text_hyphenation" th:text="${label.name}"></h2>
                    <div class="pull-right chevron"></div>
                </a>
              </li>
            </ul>
          </aside>
        </div>
      </div>
      <div class="footer container">
        <button class="btn btn-secondary pull-left" th:data-backUrl="${backUrl}" th:onclick="javascript:onContinueLabel(this.getAttribute('data-backUrl'))">
          <div class="btn-content">
            <div class="x-close2_black center-block"></div>
            <span th:text="#{undo}"></span>
          </div>
        </button>
        <button class="btn btn-default pull-right" th:data-name="${labelName}"
                th:onclick="javascript:onCreateLabel(this.getAttribute('data-name'))">
          <div class="btn-content">
            <div class="v-done_white center-block"></div>
            <span th:text="#{validate}"></span>
          </div>
        </button>
      </div>
    </div>
  </div>
</div>
<div  id="validate_create_label" class="modal" role="dialog">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <div class="pull-left">
          <div class="group_project_add_white pull-left"></div>
          <h4 class="pull-right" th:text="#{label.created}"/>
        </div>
      </div>
      <div class="modal-body text-center">
        <div class="Cefe pull-left"></div>
        <h4 th:utext="#{confirm_create_admin_label(${labelName})}" style="display: inline-block"></h4>
      </div>
    </div>
  </div>
</div>
</body>
<script src="../public/js/suggest-labels.js" th:src="@{/js/suggest-labels.js}" type="text/javascript"></script>
<script src="../public/js/create-label.js" th:src="@{/js/create-label.js}" type="text/javascript"></script>
</html>
